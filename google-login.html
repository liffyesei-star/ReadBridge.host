<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in - Google Accounts</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Roboto', sans-serif; background-color: #f0f4f9; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-[28px] w-full max-w-[1040px] flex flex-col md:flex-row overflow-hidden min-h-[400px]">
        
        <!-- Left Side: Title and Logo -->
        <div class="w-full md:w-1/2 p-10 flex flex-col items-start justify-center">
            <svg class="mb-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48px" height="48px"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
            <h1 class="text-4xl font-normal text-gray-900 mb-2">Choose an account</h1>
            <p class="text-[16px] text-gray-700">to continue to <span class="font-medium">ReadBridge</span></p>
        </div>

        <!-- Right Side: Account List -->
        <div class="w-full md:w-1/2 p-6 md:p-10 flex flex-col justify-center border-l border-gray-200">
            <div class="flex flex-col w-full max-w-[400px] mx-auto border border-gray-300 rounded-[12px] overflow-hidden">
                
                <!-- Account 1 -->
                <button onclick="loginWithGoogle('Aditya Pratama')" class="w-full text-left flex items-center p-3 hover:bg-gray-100 transition-colors border-b border-gray-200 focus:outline-none focus:bg-gray-100">
                    <img src="https://api.dicebear.com/9.x/avataaars/svg?seed=Aditya&backgroundColor=c0aede" alt="Aditya Pratama" class="w-8 h-8 rounded-full mr-3">
                    <div class="flex flex-col flex-1">
                        <span class="text-[14px] font-medium text-gray-900">Aditya Pratama</span>
                        <span class="text-[12px] text-gray-500">aditya.pratama@gmail.com</span>
                    </div>
                </button>

                <!-- Account 2 -->
                <button onclick="loginWithGoogle('Siswa Indonesia')" class="w-full text-left flex items-center p-3 hover:bg-gray-100 transition-colors border-b border-gray-200 focus:outline-none focus:bg-gray-100">
                    <img src="https://lh3.googleusercontent.com/aida-public/AB6AXuBPWVVaGXkWQMBFLEpn-ySDPe0WKEHOcwl3-OYRAtEikh9crzUun0qzUObSdGEHcwvyc9jFEAKphqQYxPEF9eMC8210T0_jOuDtMLTPukgg3X-9OTaAg4uNqzd-daKojg_muON5j9-f8PktO1QuJ2ZZvMj_rRpSkPkMgO8kDbq4mh_-TUjzZjgOpSVcYmdxgdhYj3iSrmcEISU8czkDBS4sF8INQet-of3Y1HG2QqWAKwfvS0FNmOGGbu9A8s8TO9MszaYnlZjY5F4" alt="Siswa Indonesia" class="w-8 h-8 rounded-full mr-3">
                    <div class="flex flex-col flex-1">
                        <span class="text-[14px] font-medium text-gray-900">Siswa Indonesia</span>
                        <span class="text-[12px] text-gray-500">siswa.indonesia@gmail.com</span>
                    </div>
                </button>

                <!-- Use another account -->
                <button onclick="alert('Ini hanya simulasi! Silakan pilih akun di atas.')" class="w-full text-left flex items-center p-3 hover:bg-gray-100 transition-colors focus:outline-none focus:bg-gray-100">
                    <div class="w-8 h-8 rounded-full mr-3 flex items-center justify-center text-gray-600">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 11h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/></svg>
                    </div>
                    <span class="text-[14px] font-medium text-gray-700">Use another account</span>
                </button>
            </div>
            
            <p class="text-[12px] text-gray-500 mt-6 text-center max-w-[400px] mx-auto">
                To continue, Google will share your name, email address, and profile picture with ReadBridge.
            </p>
        </div>
    </div>

    <script>
        function loginWithGoogle(username) {
            // Simulate Google Login delay
            document.body.innerHTML = `
                <div class="min-h-screen flex items-center justify-center bg-[#f0f4f9]">
                    <div class="w-8 h-8 border-4 border-[#4285F4] border-t-transparent rounded-full animate-spin"></div>
                </div>
            `;
            setTimeout(() => {
                localStorage.setItem('rb_username', username);
                localStorage.setItem('rb_is_logged_in', 'true');
                if (!localStorage.getItem('rb_interests')) {
                    window.location.href = 'minat.html';
                } else {
                    window.location.href = 'index.html';
                }
            }, 1000);
        }
    </script>

<script id="dynamic-logo-menu">
document.addEventListener("DOMContentLoaded", function() {
    // Inject Logo Menu
    const headerOrNav = document.querySelector('header, nav');
    if (headerOrNav && !document.getElementById('logo-menu-container')) {
        const treeWalker = document.createTreeWalker(headerOrNav, NodeFilter.SHOW_TEXT, {
            acceptNode: function(node) {
                return node.nodeValue.trim() === 'ReadBridge' ? NodeFilter.FILTER_ACCEPT : NodeFilter.FILTER_REJECT;
            }
        });
        const logoTextNode = treeWalker.nextNode();
        if (logoTextNode) {
            const logoEl = logoTextNode.parentElement;
            
            if (logoEl.id === 'logo-btn' || logoEl.querySelector('#logo-btn')) return;

            const wrapper = document.createElement('div');
            wrapper.style.position = 'relative';
            wrapper.style.display = 'inline-flex';
            wrapper.style.alignItems = 'center';
            wrapper.style.cursor = 'pointer';
            wrapper.id = 'logo-menu-container';
            
            logoEl.parentNode.insertBefore(wrapper, logoEl);
            wrapper.appendChild(logoEl);
            
            logoEl.id = 'logo-btn';
            logoEl.style.display = 'flex';
            logoEl.style.alignItems = 'center';
            logoEl.style.gap = '4px';
            logoEl.innerHTML = 'ReadBridge <span class="material-symbols-outlined text-[20px]">expand_more</span>';
            
            const dropdown = document.createElement('div');
            dropdown.id = 'logo-dropdown';
            dropdown.className = 'absolute left-0 top-full mt-2 w-56 bg-surface-container-lowest rounded-xl shadow-[0_8px_24px_rgba(0,0,0,0.12)] border border-outline-variant/30 overflow-hidden hidden flex-col z-50';
            
            const links = [
                { href: 'index.html', icon: 'home', text: 'Beranda' },
                { href: 'eksplor.html', icon: 'library_books', text: 'Eksplor Koleksi' },
                { href: 'sewa.html', icon: 'menu_book', text: 'Perpustakaan & Sewa' },
                { href: 'marketplace.html', icon: 'storefront', text: 'Marketplace' },
                { href: 'komunitas.html', icon: 'forum', text: 'Komunitas' },
                { href: 'tentang-kami.html', icon: 'info', text: 'Tentang Kami' }
            ];
            
            links.forEach(l => {
                const a = document.createElement('a');
                a.href = l.href;
                a.className = 'px-4 py-3 hover:bg-surface-container-low transition-colors font-label-md text-[14px] text-on-surface flex items-center gap-3 font-medium';
                a.innerHTML = `<span class="material-symbols-outlined text-[20px] text-on-surface-variant">${l.icon}</span> ${l.text}`;
                dropdown.appendChild(a);
            });
            
            wrapper.appendChild(dropdown);
            
            logoEl.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                dropdown.classList.toggle('hidden');
                dropdown.classList.toggle('flex');
            });
            document.addEventListener('click', (e) => {
                if (!dropdown.contains(e.target) && !logoEl.contains(e.target)) {
                    dropdown.classList.add('hidden');
                    dropdown.classList.remove('flex');
                }
            });
        }
    }
});
</script>
</body>

</html>
