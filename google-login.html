    <!-- Global Preference Controller Script to prevent FOUC -->
    <script id="global-preferences-controller">
        (function() {
            // Function to apply theme
            function applyTheme(theme) {
                if (theme === 'dark') {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            }
            
            // Function to apply font size
            function applyFontSize(size) {
                if (size === 'kecil') {
                    document.documentElement.style.fontSize = '14px';
                } else if (size === 'besar') {
                    document.documentElement.style.fontSize = '18px';
                } else {
                    document.documentElement.style.fontSize = '16px';
                }
            }
            
            // Function to apply font family
            function applyFontFamily(family) {
                let style = document.getElementById('global-font-override');
                if (family === 'serif') {
                    if (!style) {
                        style = document.createElement('style');
                        style.id = 'global-font-override';
                        style.innerHTML = `body, p, h1, h2, h3, h4, h5, h6, span, a, button, input, select, textarea { font-family: Georgia, serif !important; }`;
                        document.head.appendChild(style);
                    }
                } else {
                    if (style) style.remove();
                }
            }

            // Initial apply
            applyTheme(localStorage.getItem('rb_theme'));
            applyFontSize(localStorage.getItem('rb_font_size') || 'sedang');
            applyFontFamily(localStorage.getItem('rb_font_family') || 'sans');

            // Listen for storage events to sync across tabs
            window.addEventListener('storage', function(e) {
                if (e.key === 'rb_theme') {
                    applyTheme(e.newValue);
                } else if (e.key === 'rb_font_size') {
                    applyFontSize(e.newValue || 'sedang');
                } else if (e.key === 'rb_font_family') {
                    applyFontFamily(e.newValue || 'sans');
                }
            });
        })();
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, signInWithRedirect, getRedirectResult, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDUfiy2BHYhHh1wql6uM5UvsF6hpNTVvhY",
            authDomain: "readbridge-8934c.firebaseapp.com",
            projectId: "readbridge-8934c",
            storageBucket: "readbridge-8934c.firebasestorage.app",
            messagingSenderId: "900450201794",
            appId: "1:900450201794:web:8d65f989e7fefe590d8b5b",
            measurementId: "G-6HSX8L1G2R"
        };

        console.log('[Firebase Config]', firebaseConfig.projectId);

        try {
            // Initialize Firebase
            const app = initializeApp(firebaseConfig);
            console.log('[Firebase] Initialized successfully');
            
            const auth = getAuth(app);
            console.log('[Auth] Instance created');
            
            const provider = new GoogleAuthProvider();
            provider.setCustomParameters({ prompt: 'select_account' });
            console.log('[GoogleAuthProvider] Configured');

            const API_BASE = 'https://readbridge-backend-2whx.onrender.com';
            const SYNC_RETRY_DELAYS = [0, 1500, 3000, 6000];
            const GLOBAL_TIMEOUT = 120000;

            function showLoginOverlay(message = 'Preparing Google sign in...') {
                let overlay = document.getElementById('login-overlay');
                if (!overlay) {
                    overlay = document.createElement('div');
                    overlay.id = 'login-overlay';
                    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(240,244,249,0.9);display:flex;align-items:center;justify-content:center;z-index:9999;backdrop-filter:blur(4px);padding:24px;text-align:center;';
                    overlay.innerHTML = `<div style="display:flex;flex-direction:column;align-items:center;gap:14px;max-width:320px;color:#202124;font:500 14px/1.5 Roboto,sans-serif;">
                        <div style="width:36px;height:36px;border:4px solid #4285F4;border-top-color:transparent;border-radius:50%;animation:spin 0.8s linear infinite;"></div>
                        <div id="login-overlay-message"></div>
                        <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
                    </div>`;
                    document.body.appendChild(overlay);
                }
                const messageEl = document.getElementById('login-overlay-message');
                if (messageEl) messageEl.textContent = message;
                return overlay;
            }

            function hideLoginOverlay() {
                const overlay = document.getElementById('login-overlay');
                if (overlay) overlay.remove();
            }

            const wait = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

            async function fetchWithTimeout(url, options = {}, timeoutMs = 30000) {
                const controller = new AbortController();
                const timeout = setTimeout(() => controller.abort(), timeoutMs);
                try {
                    return await fetch(url, { ...options, signal: controller.signal });
                } finally {
                    clearTimeout(timeout);
                }
            }

            async function syncFirebaseUser(idToken) {
                let lastError;
                const startTime = Date.now();

                for (let i = 0; i < SYNC_RETRY_DELAYS.length; i++) {
                    if (Date.now() - startTime > GLOBAL_TIMEOUT) {
                        throw new Error('Global timeout - server tidak merespons');
                    }

                    if (SYNC_RETRY_DELAYS[i] > 0) await wait(SYNC_RETRY_DELAYS[i]);
                    showLoginOverlay(i === 0 ? 'Menyinkronkan akun Google...' : `Server masih menyiapkan akun, mencoba lagi (${i + 1}/${SYNC_RETRY_DELAYS.length})...`);

                    try {
                        console.log(`[Sync Attempt ${i + 1}] Calling /api/auth/sync`);
                        const response = await fetchWithTimeout(`${API_BASE}/api/auth/sync`, {
                            method: 'POST',
                            headers: { 
                                'Authorization': `Bearer ${idToken}`,
                                'Content-Type': 'application/json'
                            }
                        }, 25000);

                        const rawText = await response.text();
                        console.log(`[Sync Response ${i + 1}] Status: ${response.status}`);
                        
                        let data = {};
                        try {
                            data = rawText ? JSON.parse(rawText) : {};
                        } catch (parseErr) {
                            console.error('JSON Parse error:', parseErr);
                            lastError = new Error(`Response parsing gagal: ${response.status}`);
                            continue;
                        }

                        if (response.ok && data.success) {
                            console.log('[Sync Success] User synced');
                            return data;
                        }

                        lastError = new Error(data.message || `Sync gagal (${response.status})`);
                        if (response.status >= 400 && response.status < 500 && response.status !== 429) {
                            console.log('[Sync] Non-retryable error, breaking');
                            break;
                        }
                    } catch (error) {
                        lastError = error;
                        console.error(`[Sync Attempt ${i + 1} Error]`, error.message);
                        if (error.name === 'AbortError') {
                            console.log('[Sync] Timeout, retrying');
                            continue;
                        }
                    }
                }

                throw lastError || new Error('Sinkronisasi gagal');
            }

            async function handleRedirectResult() {
                let redirectCheckAttempt = 0;
                const maxRedirectAttempts = 5;

                async function tryGetRedirectResult() {
                    try {
                        redirectCheckAttempt++;
                        console.log(`[Redirect Check ${redirectCheckAttempt}] Getting result...`);
                        
                        const result = await getRedirectResult(auth);
                        console.log(`[Redirect Check ${redirectCheckAttempt}] Result:`, result ? 'User found' : 'No result');
                        
                        if (result) {
                            return result;
                        }

                        if (redirectCheckAttempt < maxRedirectAttempts) {
                            await wait(500);
                            return tryGetRedirectResult();
                        }

                        return null;
                    } catch (error) {
                        console.error(`[Redirect Check ${redirectCheckAttempt}] Error:`, error.message);
                        if (redirectCheckAttempt < maxRedirectAttempts) {
                            await wait(500);
                            return tryGetRedirectResult();
                        }
                        throw error;
                    }
                }

                try {
                    const result = await tryGetRedirectResult();
                    
                    if (result) {
                        console.log('[Redirect Success] Processing user...');
                        const user = result.user;
                        const idToken = await user.getIdToken();

                        try {
                            await syncFirebaseUser(idToken);
                            console.log('[Sync Complete]');
                        } catch (syncError) {
                            console.error('[Sync Error]', syncError.message);
                        }

                        const username = user.displayName || 'Google User';
                        const email = user.email;
                        const uid = user.uid;

                        localStorage.setItem('rb_token', idToken);
                        localStorage.setItem('rb_is_logged_in', 'true');
                        localStorage.setItem('rb_username', username);
                        localStorage.setItem('rb_email', email);
                        localStorage.setItem('rb_uid', uid);

                        sessionStorage.removeItem('rb_google_login_pending');
                        localStorage.removeItem('rb_login_in_progress');

                        showLoginOverlay('Login berhasil! Menuju halaman...');
                        await wait(1000);

                        const targetPage = localStorage.getItem('rb_interests') ? 'index.html' : 'minat.html';
                        console.log('[Redirect] Going to', targetPage);
                        window.location.href = targetPage;
                    } else {
                        console.log('[No Result] User not logging in');
                        hideLoginOverlay();
                    }
                } catch (error) {
                    console.error('[Redirect Error]', error.message, error);
                    hideLoginOverlay();
                    
                    const savedToken = localStorage.getItem('rb_token');
                    if (savedToken && localStorage.getItem('rb_is_logged_in') === 'true') {
                        console.log('[Recovery] User sudah login sebelumnya');
                        window.location.href = 'index.html';
                        return;
                    }
                    
                    alert(`❌ Google Login Error:\n${error.message}\n\nCoba:\n1. Refresh halaman\n2. Clear cache\n3. Coba lagi`);
                }
            }

            // Setup button handler
            window.realGoogleLogin = function() {
                try {
                    console.log('[Button Click] realGoogleLogin called');
                    showLoginOverlay('Membuka pilihan akun Google...');
                    sessionStorage.setItem('rb_google_login_pending', 'true');
                    localStorage.setItem('rb_login_in_progress', 'true');
                    
                    console.log('[SignIn] Calling signInWithRedirect...');
                    signInWithRedirect(auth, provider).catch((error) => {
                        hideLoginOverlay();
                        console.error('[SignIn Error]', error.code, error.message);
                        alert('❌ Google Login Failed:\n' + error.message);
                    });
                } catch (error) {
                    hideLoginOverlay();
                    console.error('[Function Error]', error);
                    alert('❌ Error: ' + error.message);
                }
            };

            // Auth state listener
            auth.onAuthStateChanged((user) => {
                console.log('[Auth State Changed]', user ? `User: ${user.email}` : 'No user');
            });

            // Check redirect on load
            console.log('[Init] Starting redirect check...');
            handleRedirectResult();

        } catch (error) {
            console.error('[Init Error]', error);
            document.body.innerHTML += `<div style="color:red;padding:20px;"><h2>⚠️ Firebase Initialization Failed</h2><p>${error.message}</p></div>`;
        }
    </script>

<script id="dynamic-logo-menu">
document.addEventListener("DOMContentLoaded", function() {
    // Inject Logo Menu
    const headerOrNav = document.querySelector('header, nav');
    if (headerOrNav && !document.getElementById('logo-menu-container')) {
        const treeWalker = document.createTreeWalker(headerOrNav, NodeFilter.SHOW_TEXT, {
            acceptNode: function(node) {
                return node.nodeValue.trim() === 'ReadBridge' ? NodeFilter.FILTER_ACCEPT : NodeFilter.FILTER_REJECT;
            }
        });
        const logoTextNode = treeWalker.nextNode();
        if (logoTextNode) {
            const logoEl = logoTextNode.parentElement;
            
            if (logoEl.id === 'logo-btn' || logoEl.querySelector('#logo-btn')) return;

            const wrapper = document.createElement('div');
            wrapper.style.position = 'relative';
            wrapper.style.display = 'inline-flex';
            wrapper.style.alignItems = 'center';
            wrapper.style.cursor = 'pointer';
            wrapper.id = 'logo-menu-container';
            
            logoEl.parentNode.insertBefore(wrapper, logoEl);
            wrapper.appendChild(logoEl);
            
            logoEl.id = 'logo-btn';
            logoEl.style.display = 'flex';
            logoEl.style.alignItems = 'center';
            logoEl.style.gap = '4px';
            logoEl.innerHTML = 'ReadBridge <span class="material-symbols-outlined text-[20px]">expand_more</span>';
            
            const dropdown = document.createElement('div');
            dropdown.id = 'logo-dropdown';
            dropdown.className = 'absolute left-0 top-full mt-2 w-56 bg-surface-container-lowest rounded-xl shadow-[0_8px_24px_rgba(0,0,0,0.12)] border border-outline-variant/30 overflow-hidden hidden flex-col z-50';
            
            const links = [
                { href: 'index.html', icon: 'home', text: 'Beranda' },
                { href: 'eksplor.html', icon: 'library_books', text: 'Eksplor Koleksi' },
                { href: 'sewa.html', icon: 'menu_book', text: 'Perpustakaan & Sewa' },
                { href: 'marketplace.html', icon: 'storefront', text: 'Marketplace' },
                { href: 'komunitas.html', icon: 'forum', text: 'Komunitas' },
                { href: 'tentang-kami.html', icon: 'info', text: 'Tentang Kami' }
            ];
            
            links.forEach(l => {
                const a = document.createElement('a');
                a.href = l.href;
                a.className = 'px-4 py-3 hover:bg-surface-container-low transition-colors font-label-md text-[14px] text-on-surface flex items-center gap-3 font-medium';
                a.innerHTML = `<span class="material-symbols-outlined text-[20px] text-on-surface-variant">${l.icon}</span> ${l.text}`;
                dropdown.appendChild(a);
            });
            
            wrapper.appendChild(dropdown);
            
            logoEl.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();
                dropdown.classList.toggle('hidden');
                dropdown.classList.toggle('flex');
            });
            document.addEventListener('click', (e) => {
                if (!dropdown.contains(e.target) && !logoEl.contains(e.target)) {
                    dropdown.classList.add('hidden');
                    dropdown.classList.remove('flex');
                }
            });
        }
    }
});
</script>
