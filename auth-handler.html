<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ReadBridge — Login Google</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font: 500 15px/1.5 system-ui, sans-serif;
      background: #f8fafc;
      color: #0f172a;
    }
    .box { text-align: center; max-width: 360px; padding: 24px; }
    .spin {
      width: 40px; height: 40px; margin: 0 auto 20px;
      border: 4px solid #2563eb;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    a, button.link {
      color: #2563eb;
      background: none;
      border: none;
      font: inherit;
      cursor: pointer;
      text-decoration: underline;
    }
    .btn {
      display: inline-block;
      margin-top: 16px;
      padding: 12px 24px;
      background: #2563eb;
      color: #fff;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 600;
    }
    .err { color: #dc2626; font-size: 13px; margin-top: 12px; }
  </style>
</head>
<body>
  <div class="box">
    <div class="spin" id="spin"></div>
    <p id="rb-auth-status">Memuat...</p>
    <p class="err" id="rb-auth-error" hidden></p>
    <div id="rb-done" hidden>
      <a class="btn" id="rb-continue-btn" href="eksplor.html">Lanjut ke ReadBridge</a>
    </div>
    <p style="font-size:12px;margin-top:20px">
      <a href="login.html">← Kembali ke login</a>
      ·
      <button type="button" class="link" onclick="location.href='login.html'">Pakai popup (Chrome)</button>
    </p>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script>
    (function () {
      var API = "https://readbridge-backend-2whx.onrender.com";
      var BUSY_KEY = "rb_google_busy";
      var COOLDOWN_MS = 2500;

      firebase.initializeApp({
        apiKey: "AIzaSyDUfiy2BHYhHh1wql6uM5UvsF6hpNTVvhY",
        authDomain: "readbridge-8934c.firebaseapp.com",
        projectId: "readbridge-8934c",
        storageBucket: "readbridge-8934c.firebasestorage.app",
        messagingSenderId: "900450201794",
        appId: "1:900450201794:web:8d65f989e7fefe590d8b5b",
      });

      var auth = firebase.auth();
      var params = new URLSearchParams(location.search);
      var shouldStart = params.get("go") === "1";

      function status(msg) {
        document.getElementById("rb-auth-status").textContent = msg;
        console.log("[ReadBridge Redirect]", msg);
      }

      function isOAuthReturn() {
        var blob = location.search + location.hash;
        return /apiKey=|authType=|state=|mode=signIn/i.test(blob);
      }

      function dest() {
        return localStorage.getItem("rb_interests") ? "eksplor.html" : "minat.html";
      }

      function isBusy() {
        var t = sessionStorage.getItem(BUSY_KEY);
        return t && Date.now() - parseInt(t, 10) < COOLDOWN_MS;
      }

      function showDone(user) {
        document.getElementById("spin").style.display = "none";
        if (window.history.replaceState) {
          window.history.replaceState({}, "", location.pathname);
        }
        status("Halo, " + (user.displayName || "pengguna") + "! Mengalihkan...");
        setTimeout(function () {
          location.replace(dest());
        }, 500);
      }

      function saveAndFinish(user) {
        sessionStorage.removeItem(BUSY_KEY);
        status("Menyimpan sesi...");
        return user.getIdToken().then(function (token) {
          return fetch(API + "/api/auth/sync", {
            method: "POST",
            headers: { Authorization: "Bearer " + token, "Content-Type": "application/json" },
          })
            .catch(function () {})
            .then(function () {
              localStorage.removeItem("rb_explicit_logout");
              localStorage.setItem("rb_is_logged_in", "true");
              localStorage.setItem("rb_token", token);
              localStorage.setItem("rb_username", user.displayName || "Google User");
              localStorage.setItem("rb_email", user.email || "");
              localStorage.setItem("rb_uid", user.uid);
              if (user.photoURL) localStorage.setItem("rb_profile_pic", user.photoURL);
              showDone(user);
            });
        });
      }

      function fail(msg) {
        sessionStorage.removeItem(BUSY_KEY);
        document.getElementById("spin").style.display = "none";
        document.getElementById("rb-auth-error").hidden = false;
        document.getElementById("rb-auth-error").textContent = msg;
        status("Gagal");
      }

      // Sudah login — jangan redirect otomatis
      if (
        !isOAuthReturn() &&
        !shouldStart &&
        localStorage.getItem("rb_is_logged_in") === "true" &&
        localStorage.getItem("rb_token")
      ) {
        status("Sudah masuk, mengalihkan...");
        setTimeout(function () { location.replace(dest()); }, 350);
        return;
      }

      if (isOAuthReturn()) {
        status("Menyelesaikan login...");
        
        var isResolved = false;
        // Safeguard timeout 10 detik jika getRedirectResult menggantung di PWA standalone
        setTimeout(function () {
          if (!isResolved) {
            console.warn("[ReadBridge Redirect] getRedirectResult timed out after 10s");
            fail("Proses masuk memakan waktu terlalu lama. Hal ini sering terjadi pada PWA standalone karena pembatasan cookie dari sistem Android/browser.\n\nSilakan klik tombol di bawah untuk membuka alur login di browser Chrome/Safari biasa.");
            
            // Tampilkan tautan alternatif untuk memaksa buka di browser sistem
            var altLink = document.createElement("a");
            altLink.className = "btn";
            altLink.style.background = "#006c49"; // Emerald green matching design palette
            altLink.href = "auth-handler.html?go=1";
            altLink.target = "_blank";
            altLink.textContent = "Buka di Browser Sistem";
            
            var doneDiv = document.getElementById("rb-done");
            if (doneDiv) {
              doneDiv.innerHTML = "";
              doneDiv.appendChild(altLink);
              doneDiv.hidden = false;
            }
          }
        }, 10000);

        auth
          .getRedirectResult()
          .then(function (result) {
            isResolved = true;
            var user = (result && result.user) || auth.currentUser;
            if (user) return saveAndFinish(user);
            fail("Sesi Google tidak ditemukan. Coba login popup di halaman login.");
          })
          .catch(function (err) {
            isResolved = true;
            fail(err.message || "Login gagal");
          });
        return;
      }

      if (shouldStart) {
        status("Mengalihkan ke Google...");
        var provider = new firebase.auth.GoogleAuthProvider();
        provider.setCustomParameters({ prompt: "select_account" });
        auth.signInWithRedirect(provider);
        return;
      }

      location.replace("login.html");
    })();
  </script>
</body>
</html>
