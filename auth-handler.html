<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ReadBridge — Login Google</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font: 500 15px/1.5 system-ui, sans-serif;
      background: #f8fafc;
      color: #0f172a;
    }
    .box { text-align: center; max-width: 320px; padding: 24px; }
    .spin {
      width: 36px; height: 36px; margin: 0 auto 16px;
      border: 4px solid #2563eb;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    a { color: #2563eb; }
  </style>
</head>
<body>
  <div class="box">
    <div class="spin" aria-hidden="true"></div>
    <p id="rb-auth-status">Menghubungkan ke Google...</p>
    <p style="font-size:12px;margin-top:16px"><a href="login.html">Kembali ke login</a></p>
  </div>
  <script type="module">
    import { runGoogleAuthHandler } from "./auth-google.js?v=6";
    runGoogleAuthHandler({
      redirectAfterLogin: "eksplor.html",
      redirectIfNoInterests: "minat.html",
    }).catch((err) => {
      console.error("[ReadBridge Auth]", err);
      document.getElementById("rb-auth-status").textContent = "Error: " + err.message;
    });
  </script>
</body>
</html>
